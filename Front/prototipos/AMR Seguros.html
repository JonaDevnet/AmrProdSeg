    --ink-700: oklch(0.34 0.02 250);
    --ink-500: oklch(0.55 0.015 250);
    --ink-400: oklch(0.68 0.012 250);
    --line:    oklch(0.91 0.015 245);

    --bad-700: oklch(0.45 0.16 28);
    --bad-600: oklch(0.53 0.17 28);
    --bad-500: oklch(0.62 0.17 28);
    --ok-600:  oklch(0.52 0.12 157);
    --bad-100: oklch(0.95 0.04 28);

    --r-sm: 6px;
    --r:    10px;
    --r-lg: 14px;
    --r-xl: 20px;

    --shadow-sm: 0 1px 0 oklch(0.20 0.02 250 / 0.04), 0 1px 2px oklch(0.20 0.02 250 / 0.05);
    --shadow:    0 1px 0 oklch(0.20 0.02 250 / 0.04), 0 6px 24px -8px oklch(0.20 0.06 250 / 0.18);
    --shadow-lg: 0 24px 60px -20px oklch(0.18 0.06 252 / 0.35);

<!-- Registro central de compañías (JS plano: disponible antes que cualquier script Babel) -->
<script>
(function () {
  var CO_PALETTE = [
    "oklch(0.52 0.16 28)", "oklch(0.45 0.13 250)", "oklch(0.46 0.12 155)",
    "oklch(0.50 0.14 200)", "oklch(0.54 0.13 65)", "oklch(0.48 0.15 300)",
    "oklch(0.50 0.15 18)", "oklch(0.46 0.12 140)", "oklch(0.48 0.14 270)",
    "oklch(0.52 0.14 95)"
  ];
  var CO_SEED = [
    { n: "NRE Cia Seguros",          c: CO_PALETTE[0] },
    { n: "La Perseverancia Seguros", c: CO_PALETTE[1] },
    { n: "Libra",                    c: CO_PALETTE[2] },
    { n: "Paraná Seguros",           c: CO_PALETTE[3] },
    { n: "Agrosalta Coop Seg",       c: CO_PALETTE[4] },
    { n: "ATM Seguros",              c: CO_PALETTE[5] }
  ];
  function getCompanias() {
    try {
      var raw = localStorage.getItem("amr_companias");
      if (raw) { var l = JSON.parse(raw); if (Array.isArray(l) && l.length) return l; }
    } catch (e) {}
    return CO_SEED.slice();
  }
  function saveCompanias(list) {
    try { localStorage.setItem("amr_companias", JSON.stringify(list)); } catch (e) {}
  }
  function addCompania(name) {
    var list = getCompanias();
    var clean = (name || "").trim();
    if (!clean) return list;
    if (list.some(function (c) { return c.n.toLowerCase() === clean.toLowerCase(); })) return list;
    var c = CO_PALETTE[list.length % CO_PALETTE.length];
    var next = list.concat([{ n: clean, c: c }]);
    saveCompanias(next);
    return next;
  }
  function removeCompania(name) {
    var next = getCompanias().filter(function (c) { return c.n !== name; });
    saveCompanias(next);
    return next;
  }
  function coAt(arr, i) { return arr[i] || arr[0] || { n: "—", c: "var(--ink-400)" }; }

  window.CO_PALETTE = CO_PALETTE;
  window.CO_SEED = CO_SEED;
  window.getCompanias = getCompanias;
  window.saveCompanias = saveCompanias;
  window.addCompania = addCompania;
  window.removeCompania = removeCompania;
  window.coAt = coAt;
})();
</script>
