server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión de assets estáticos
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache largo para assets con hash; el index nunca se cachea
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: cualquier ruta desconocida devuelve index.html (routing en el cliente,
    # ej. /verificar/:token, /cartera, etc.). /api y /comprobantes los enruta
    # Traefik directo al backend, no pasan por acá.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
